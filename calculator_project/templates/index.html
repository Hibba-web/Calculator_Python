<!DOCTYPE html>
<html>
<head>
    <title>Pro Calculator</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<button onclick="toggleTheme()" class="theme-btn">🌙/☀️</button>

<div class="container">

    <!-- Calculator -->
    <div class="calculator">
        <input type="text" id="display" readonly>

        <div class="buttons">
            <button onclick="press('7')">7</button>
            <button onclick="press('8')">8</button>
            <button onclick="press('9')">9</button>
            <button onclick="press('/')">÷</button>

            <button onclick="press('4')">4</button>
            <button onclick="press('5')">5</button>
            <button onclick="press('6')">6</button>
            <button onclick="press('*')">×</button>

            <button onclick="press('1')">1</button>
            <button onclick="press('2')">2</button>
            <button onclick="press('3')">3</button>
            <button onclick="press('-')">−</button>

            <button onclick="press('0')">0</button>
            <button onclick="press('.')">.</button>
            <button onclick="calculate()">=</button>
            <button onclick="press('+')">+</button>

            <button onclick="press('sin(')">sin</button>
            <button onclick="press('cos(')">cos</button>
            <button onclick="press('tan(')">tan</button>
            <button onclick="press('log(')">log</button>
            <button onclick="press('sqrt(')">√</button>

            <button onclick="clearDisplay()">C</button>
            <button onclick="startVoice()">🎤</button>
            <button onclick="plotGraph()">📊</button>
            <button onclick="press(')')">)</button>
        </div>
    </div>

    <!-- History -->
    <div class="history">
        <h3>History</h3>
        <ul id="historyList"></ul>
    </div>

</div>

<!-- Graph -->
<canvas id="graph" width="400" height="200"></canvas>

<script src="/static/script.js"></script>
</body>
</html>
